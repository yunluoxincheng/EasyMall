# Docker 生产环境配置
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 所有敏感配置必须通过环境变量或 .env 文件提供，无默认值

services:
  easymall-app:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # 数据源配置 — 必须通过环境变量提供
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      # Redis 配置 — 密码必须设置
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${SPRING_DATA_REDIS_PASSWORD}
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET}
      # RabbitMQ 配置
      - SPRING_RABBITMQ_HOST=${SPRING_RABBITMQ_HOST:-rabbitmq}
      - SPRING_RABBITMQ_PORT=${SPRING_RABBITMQ_PORT:-5672}
      - SPRING_RABBITMQ_USERNAME=${SPRING_RABBITMQ_USERNAME:-guest}
      - SPRING_RABBITMQ_PASSWORD=${SPRING_RABBITMQ_PASSWORD:-guest}
      # 订单超时
      - EASYMALL_ORDER_TIMEOUT_MINUTES=${EASYMALL_ORDER_TIMEOUT_MINUTES:-30}
      # 文件上传配置
      - FILE_UPLOAD_BASE_PATH=${FILE_UPLOAD_BASE_PATH}
      - FILE_UPLOAD_BASE_URL=${FILE_UPLOAD_BASE_URL}
      # JVM 参数
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: always

  redis:
    # 生产环境 Redis 必须设置密码
    command: redis-server --requirepass ${SPRING_DATA_REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SPRING_DATA_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
