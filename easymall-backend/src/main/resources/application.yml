spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: EasyMall

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.ruikun.modules.user.entity,org.ruikun.modules.product.entity,org.ruikun.modules.order.entity,org.ruikun.modules.coupon.entity,org.ruikun.modules.points.entity,org.ruikun.modules.comment.entity,org.ruikun.modules.favorite.entity,org.ruikun.modules.inventory.entity,org.ruikun.modules.payment.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

file:
  upload:
    max-size: 5242880
    allowed-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/gif

logging:
  level:
    org.ruikun: ${LOG_LEVEL:info}
    org.springframework.security: ${LOG_LEVEL_SECURITY:warn}
