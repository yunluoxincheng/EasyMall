spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

  rabbitmq:
    listener:
      simple:
        auto-startup: false

  datasource:
    url: ${TEST_JDBC_URL}
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}

jwt:
  secret: test-jwt-secret-key-for-unit-tests-minimum-256-bits-required-by-hmac-sha256-algorithm-padding
  expiration: 86400000

payment:
  mock:
    signature: test-mock-signature

easymall:
  order:
    timeout-minutes: 30
