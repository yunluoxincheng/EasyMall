services:
  easymall-frontend:
    build:
      context: easymall-frontend/
    container_name: easymall-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - BACKEND_HOST=easymall-app
    volumes:
      - upload-data:/data/easymall/uploads
    depends_on:
      easymall-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - easymall-net
    restart: unless-stopped

  easymall-app:
    build:
      context: easymall-backend/
    container_name: easymall-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/easymall?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_FLYWAY_URL=jdbc:mysql://mysql:3306/easymall?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_FLYWAY_USER=root
      - SPRING_FLYWAY_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - FILE_UPLOAD_BASE_PATH=/data/easymall/uploads
      - FILE_UPLOAD_BASE_URL=${FILE_UPLOAD_BASE_URL:-http://localhost/uploads}
      - PAYMENT_MOCK_SIGNATURE=${PAYMENT_MOCK_SIGNATURE:?PAYMENT_MOCK_SIGNATURE is required}
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - upload-data:/data/easymall/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - easymall-net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: easymall-mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --init-connect="SET NAMES utf8mb4"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      - MYSQL_DATABASE=easymall
      - TZ=Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:?}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easymall-net

  redis:
    image: redis:7-alpine
    container_name: easymall-redis
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$REDIS_PASSWORD"
        else
          exec redis-server
        fi
      '
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a \"$${REDIS_PASSWORD}\"} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easymall-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: easymall-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - easymall-net

networks:
  easymall-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  upload-data:
    driver: local
