server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: EasyMall

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/easymall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
      timeout: 30000ms

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.ruikun.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:easymall-jwt-secret-key-2023-very-long-secret-key-for-hmac-sha256-algorithm-requirement-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

file:
  upload:
    base-path: ${FILE_UPLOAD_PATH:/data/easymall/uploads}
    base-url: ${FILE_UPLOAD_URL:http://localhost:8080/uploads}
    max-size: 5242880
    allowed-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/gif

logging:
  level:
    org.ruikun: ${LOG_LEVEL:info}
    org.springframework.security: ${LOG_LEVEL_SECURITY:warn}